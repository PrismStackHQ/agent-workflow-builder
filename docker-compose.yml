version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_workflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
      API_GATEWAY_PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  onboarding-service:
    build:
      context: .
      dockerfile: services/onboarding-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  connection-registry:
    build:
      context: .
      dockerfile: services/connection-registry/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  rag-registry:
    build:
      context: .
      dockerfile: services/rag-registry/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  agent-builder:
    build:
      context: .
      dockerfile: services/agent-builder/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  scheduler-service:
    build:
      context: .
      dockerfile: services/scheduler-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
      AGENT_RUNTIME_IMAGE: agent-runtime:latest
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  agent-runtime:
    build:
      context: .
      dockerfile: services/agent-runtime/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  websocket-service:
    build:
      context: .
      dockerfile: services/websocket-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_workflow
      NATS_URL: nats://nats:4222
      WEBSOCKET_PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:3002/ws
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
      - websocket-service

volumes:
  pgdata:
