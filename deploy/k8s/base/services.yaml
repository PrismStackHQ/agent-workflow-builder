  namespace: agent-workflow-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-service
  template:
    metadata:
      labels:
        app: websocket-service
    spec:
      containers:
        - name: websocket-service
          image: agent-workflow/websocket-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: NATS_URL
              value: nats://nats:4222
            - name: WEBSOCKET_PORT
              value: "3002"
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service
  namespace: agent-workflow-system
spec:
  selector:
    app: websocket-service
  ports:
    - port: 3002
      targetPort: 3002
---
# Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: agent-workflow-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: agent-workflow/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://api-gateway:3001/api/v1
            - name: NEXT_PUBLIC_WS_URL
              value: ws://websocket-service:3002/ws
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: agent-workflow-system
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
