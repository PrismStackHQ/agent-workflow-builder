  namespace: agent-workflow-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler-service
  template:
    metadata:
      labels:
        app: scheduler-service
    spec:
      serviceAccountName: scheduler-sa
      containers:
        - name: scheduler-service
          image: agent-workflow/scheduler-service:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: NATS_URL
